name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have a great idea? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: Is your feature request related to a problem? What's missing?
      placeholder: "I wish I could... / It's frustrating that..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Audio / Streaming
        - OLED Display / Visualizer
        - Web Interface
        - WiFi / Network
        - Hardware / Wiring
        - Documentation
        - Other

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought of?

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this hasn't been requested before
          required: true
        - label: I'm willing to submit a PR for this feature
