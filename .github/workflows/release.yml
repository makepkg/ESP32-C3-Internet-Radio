name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/platformio.ini') }}

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('**/platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Run PlatformIO Build
        run: pio run

      - name: Prepare Assets
        run: |
          mkdir -p release_assets
          cp .pio/build/esp32-c3-devkitm-1/firmware.bin release_assets/
          cp .pio/build/esp32-c3-devkitm-1/partitions.bin release_assets/
          cp platformio.ini release_assets/
          zip -r ESP32-C3-Radio-v${{ github.ref_name }}.zip release_assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ESP32-C3-Radio-v${{ github.ref_name }}.zip
            .pio/build/esp32-c3-devkitm-1/firmware.bin
          name: Release ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
